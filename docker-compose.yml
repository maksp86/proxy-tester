services:
  proxy-tester:
    build: .
    container_name: proxy-tester
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json:ro
      - ./geoip:/app/geoip
      - ./proxy_pool.sqlite3:/app/proxy_pool.sqlite3
      - ./result.txt:/app/result.txt
    command: ["python", "main.py", "--config", "config.json", "--verbose"]
